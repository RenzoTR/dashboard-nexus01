version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus_postgres
    environment:
      POSTGRES_DB: nexus_leads
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus_leads"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus_api
    env_file:
      - .env
    environment:
      APP_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/nexus_leads
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CORS_ORIGINS: http://localhost,http://127.0.0.1
      SCRAPER_MODE: ${SCRAPER_MODE:-mock}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus_worker
    command: celery -A server.workers.celery_app.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/nexus_leads
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SCRAPER_MODE: ${SCRAPER_MODE:-mock}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL:
    container_name: nexus_frontend
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    container_name: nexus_nginx
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
